name: Validate, Generate, Publish

on:
  push:
    branches: [main]
    paths:
      - "entries/**"
      - "schema/**"
  schedule:
    - cron: "0 7 * * 1"  # every Monday 07:00 UTC
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jsonschema google-api-python-client google-auth

      - name: Validate entries
        run: python3 scripts/validate_entries.py

      - name: Generate outputs
        run: python3 scripts/generate.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/
          git diff --staged --quiet || git commit -m "chore: regenerate outputs"
          git push

      - name: Publish to Google Sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python3 scripts/publish_to_sheet.py
