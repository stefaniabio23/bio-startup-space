$schema: "http://json-schema.org/draft-07/schema#"
title: PriorWork
description: >
  A paper or study grounding one or more technical primitives in the literature.
  Links to primitives via technology_platform_ids (generates `evidence` edges).
  The analytical one-liners (hypothesis, methods, what_it_proves, next_question)
  are what make it useful for a founder search, not just a citation.
type: object

required:
  - id
  - title
  - technology_platform_ids
  - last_verified

properties:
  id:
    type: string
    pattern: "^pw-[a-z0-9-]+$"
    description: "pw-<slug>, equals filename stem"
  title:
    type: string
  authors:
    type: array
    items:
      type: string
  year:
    type: integer
  doi:
    type: string
  url:
    type: string
  venue:
    type: string
  citations:
    type: integer
  technology_platform_ids:
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^[a-z0-9-]+$"
    description: primitive ids this paper is evidence for (must resolve to primitives/)
  substrate_tags:
    type: array
    items:
      type: string
  hypothesis:
    type: string
    description: One line, what the paper claims or tests
  methods:
    type: string
    description: One line, how they did it
  what_it_proves:
    type: string
    description: One line, what it establishes for the primitive
  next_question:
    type: string
    description: One line, the open question this raises for a builder
  related_works:
    type: array
    items:
      type: string
    description: DOIs or titles of adjacent papers
  notes:
    type: string
  last_verified:
    type: string
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"
